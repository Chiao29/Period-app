<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flow - 暖心追蹤</title>
    
    <!-- PWA 與 iOS 最佳化設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Flow">
    <link rel="apple-touch-icon" href="app-icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff9a9e">

    <style>
        :root { 
            --warm-pink: #ff9a9e; 
            --soft-cream: #fff9f5;
            --watercolor-bg: #fef0f0;
            --text-color: #5d4037;
            --glass-white: rgba(255, 255, 255, 0.7);
        }
        
        body { 
            font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; 
            background: linear-gradient(180deg, var(--watercolor-bg) 0%, #fff 100%);
            color: var(--text-color);
            margin: 0; 
            padding: 20px;
            padding-top: calc(env(safe-area-inset-top) + 20px);
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 頂部宮崎駿風格圓環卡片 */
        .status-container {
            background: var(--glass-white);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 100%;
            max-width: 400px;
            border-radius: 40px;
            padding: 45px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(255, 154, 158, 0.12);
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-sizing: border-box;
            position: relative;
        }

        .phase-badge {
            display: inline-block;
            background: linear-gradient(90deg, #ff9a9e, #ff8a8f);
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 12px;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(255, 154, 158, 0.2);
        }

        .days-big { 
            font-size: 4.8rem; 
            font-weight: 200;
            color: var(--warm-pink);
            margin: 5px 0;
            text-shadow: 0 0 20px rgba(255, 154, 158, 0.2);
        }

        .warm-tips {
            font-size: 0.95rem;
            opacity: 0.85;
            padding: 10px 25px 0;
            line-height: 1.6;
            font-style: italic;
        }

        /* 功能卡片區 */
        .card { 
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 100%; 
            max-width: 400px; 
            border-radius: 30px; 
            padding: 25px; 
            box-sizing: border-box; 
            margin-bottom: 20px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            border: 1px solid rgba(255,255,255,0.5);
        }

        h3 { 
            margin-top: 0; 
            font-size: 1.15rem; 
            font-weight: 600;
            color: var(--text-color);
            display: flex;
            align-items: center;
        }
        h3::before {
            content: '🌸';
            margin-right: 8px;
            font-size: 1rem;
        }

        input[type="date"] { 
            width: 100%; 
            border: none;
            background: rgba(255, 255, 255, 0.5);
            padding: 14px; 
            border-radius: 15px; 
            font-size: 1.1rem; 
            margin: 10px 0;
            color: var(--text-color);
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            -webkit-appearance: none;
        }

        /* 症狀標籤 */
        .symptom-group { display: flex; flex-wrap: wrap; gap: 10px; margin: 18px 0; }
        .symptom-tag {
            padding: 10px 18px;
            background: white;
            border-radius: 14px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #f0f0f0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .symptom-tag.active {
            background: var(--warm-pink);
            color: white;
            transform: scale(1.05);
            border-color: var(--warm-pink);
            box-shadow: 0 4px 12px rgba(255, 154, 158, 0.3);
        }

        button.main-btn { 
            width: 100%; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 20px; 
            font-size: 1.1rem; 
            font-weight: 600; 
            box-shadow: 0 8px 20px rgba(255, 154, 158, 0.3);
            cursor: pointer;
            transition: transform 0.2s;
        }
        button.main-btn:active { transform: scale(0.97); }

        /* 歷史紀錄清單 */
        .history-section { width: 100%; max-width: 400px; }
        .history-item {
            background: var(--glass-white);
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.6);
            backdrop-filter: blur(5px);
        }
        .history-date { font-weight: 600; font-size: 1.05rem; margin-bottom: 4px; }
        .history-tags { font-size: 0.85rem; color: #a68b8b; }
        .del-btn { 
            color: #d1d1d1; 
            font-size: 0.85rem; 
            padding: 10px;
            cursor: pointer;
        }
        .del-btn:hover { color: #ff3b30; }
    </style>
</head>
<body>

    <div class="status-container">
        <div class="phase-badge" id="phaseText">暖心生活開始</div>
        <div class="days-big" id="daysCounter">--</div>
        <div id="predictDateStr" style="font-size:0.95rem; margin-bottom: 12px; opacity: 0.7;">妳的專屬生理期守護</div>
        <div class="warm-tips" id="warmTips">今天也要記得對自己溫柔一點。</div>
    </div>

    <div class="card">
        <h3>記錄今天</h3>
        <input type="date" id="dateInput">
        <div class="symptom-group">
            <div class="symptom-tag" onclick="toggleTag(this)">心情好</div>
            <div class="symptom-tag" onclick="toggleTag(this)">悶悶的</div>
            <div class="symptom-tag" onclick="this.classList.toggle('active')">想吃甜食</div>
            <div class="symptom-tag" onclick="this.classList.toggle('active')">胸部脹</div>
            <div class="symptom-tag" onclick="this.classList.toggle('active')">累累的</div>
        </div>
        <button class="main-btn" onclick="saveRecord()">儲存這筆紀錄</button>
    </div>

    <div class="history-section" id="recordList"></div>

<script>
    const KEY = 'period_data_v2';

    function toggleTag(el) {
        el.classList.toggle('active');
    }

    function saveRecord() {
        const date = document.getElementById('dateInput').value;
        if (!date) {
            alert('請選擇日期');
            return;
        }
        
        let tags = [];
        document.querySelectorAll('.symptom-tag.active').forEach(tag => tags.push(tag.innerText));
        
        let data = JSON.parse(localStorage.getItem(KEY) || '[]');
        data.push({date: date, tags: tags});
        
        // 排序
        data.sort((a,b) => new Date(b.date) - new Date(a.date));
        
        localStorage.setItem(KEY, JSON.stringify(data));
        
        // 重置 UI
        document.querySelectorAll('.symptom-tag').forEach(t => t.classList.remove('active'));
        render();
    }

    function render() {
        const list = document.getElementById('recordList');
        const data = JSON.parse(localStorage.getItem(KEY) || '[]');
        
        list.innerHTML = data.map((r, i) => `
            <div class="history-item">
                <div>
                    <div class="history-date">${r.date}</div>
                    <div class="history-tags">${r.tags && r.tags.length > 0 ? '✨ ' + r.tags.join(', ') : '無備註'}</div>
                </div>
                <div class="del-btn" onclick="del(${i})">刪除</div>
            </div>
        `).join('');

        if(data.length > 0) {
            const lastDate = new Date(data[0].date);
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const daysSinceStart = Math.floor((today - lastDate) / (1000*60*60*24));
            updateUI(daysSinceStart, lastDate);
        } else {
            document.getElementById('daysCounter').innerText = "--";
            document.getElementById('phaseText').innerText = "點擊下方開啟紀錄";
        }
    }

    function updateUI(days, lastDate) {
        const counter = document.getElementById('daysCounter');
        const phase = document.getElementById('phaseText');
        const tips = document.getElementById('warmTips');
        
        let nextDate = new Date(lastDate);
        nextDate.setDate(lastDate.getDate() + 28);
        const diffDays = Math.ceil((nextDate - new Date()) / (1000*60*60*24));

        if (days >= 0 && days <= 5) {
            phase.innerText = "生理期間";
            counter.innerText = days + 1;
            tips.innerText = "這幾天多喝熱飲，注意腹部保暖，妳辛苦了。";
        } else if (days > 5 && days <= 13) {
            phase.innerText = "濾泡期 (距離下次)";
            counter.innerText = diffDays;
            tips.innerText = "能量回升中！皮膚狀態會變好，心情也會漸漸放晴。";
        } else if (days > 13 && days <= 16) {
            phase.innerText = "排卵期 (距離下次)";
            counter.innerText = diffDays;
            tips.innerText = "最有魅力的時刻！身體代謝較快，適合多出門走走。";
        } else {
            phase.innerText = "黃體期 (距離下次)";
            counter.innerText = diffDays;
            tips.innerText = "進入經前守護期。可能會想吃甜食或愛睏，別給自己太大壓力。";
        }
        
        document.getElementById('predictDateStr').innerText = "下次預計：" + nextDate.toLocaleDateString();
    }

    function del(i) {
        if(confirm('要刪除這筆紀錄嗎？')) {
            let data = JSON.parse(localStorage.getItem(KEY) || '[]');
            data.splice(i, 1);
            localStorage.setItem(KEY, JSON.stringify(data));
            render();
        }
    }

    // 初始化
    document.getElementById('dateInput').valueAsDate = new Date();
    render();
</script>
</body>
</html>
